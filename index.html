<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투어메이커 표준 행정 메일 생성기</title>
    <!-- Tailwind CSS for modern, clean UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Analytics 4 (투어메이커 기본 측정 ID) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLH9GD9SVR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLH9GD9SVR');

    <style>
        /* 커스텀 스크롤바 스타일 */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 전체 화면 꽉 차게 설정 */
        body, html { height: 100%; margin: 0; }

</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-gray-800 flex flex-col items-center justify-center min-h-screen">

    <!-- 메인 컨테이너 (화면 중앙에 넓게 배치) -->
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl overflow-hidden flex flex-col h-auto md:h-[90vh]">
        
        <!-- 헤더 -->
        <div class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-slate-50">
            <h3 class="text-xl font-bold text-gray-800 flex items-center">
                <span class="text-3xl mr-3">📧</span> 표준 행정 메일 자동 생성기
            </h3>
            <span class="text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">TOURMAKER ADMIN PORTAL</span>
        </div>

        <!-- 바디 (좌우 2단 레이아웃) -->
        <div class="p-8 overflow-y-auto flex-grow">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 h-full">
                
                <!-- 왼쪽 열: 데이터 입력 -->
                <div class="flex flex-col space-y-6">
                    <h4 class="font-bold text-gray-800 border-b-2 border-indigo-100 pb-3 flex items-center text-lg">
                        <svg class="w-6 h-6 text-indigo-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        기본 정보 입력
                    </h4>
                    
                    <div class="space-y-5">
                        <!-- 학교명 입력 -->
                        <div>
                            <label for="schoolInput" class="block text-sm font-semibold text-gray-700 mb-1.5">학교/기관명</label>
                            <input type="text" id="schoolInput" oninput="updatePreview()" placeholder="예: 문곡중학교" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition shadow-sm">
                        </div>
                        
                        <!-- 행사명 입력 -->
                        <div>
                            <label for="eventInput" class="block text-sm font-semibold text-gray-700 mb-1.5">행사명</label>
                            <input type="text" id="eventInput" oninput="updatePreview()" placeholder="예: 2026학년도 테마형 현장체험학습(제주)" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition shadow-sm">
                        </div>

                        <!-- 서류함 URL 입력 -->
                        <div>
                            <label for="urlInput" class="block text-sm font-semibold text-gray-700 mb-1.5">출발전제출서류 URL</label>
                            <input type="text" id="urlInput" oninput="updatePreview()" placeholder="예: https://indadady.github.io/Departure_Documents/" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition shadow-sm">
                        </div>
                        
                        <!-- 스마트가이드북 URL 입력 -->
                        <div>
                            <label for="guidebookInput" class="block text-sm font-semibold text-gray-700 mb-1.5">스마트 가이드북 URL</label>
                            <input type="text" id="guidebookInput" oninput="updatePreview()" placeholder="예: https://indadady.github.io/260512_Osak" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition shadow-sm border-indigo-200 bg-indigo-50/30">
                        </div>
                    </div>

                    <!-- 작성 팁박스 -->
                    <div class="bg-indigo-50 p-5 rounded-xl mt-auto border border-indigo-100 shadow-inner">
                        <p class="text-sm text-indigo-800 leading-relaxed">
                            <strong class="block mb-2 text-base">💡 대표님 실무 팁</strong>
                            좌측에 행사 데이터를 입력하면 우측 안내문에 <strong>실시간으로 반영</strong>됩니다.<br><br>
                            내용 확인 후 우측 하단의 <strong>[텍스트 복사하기]</strong> 버튼을 눌러 행정실 담당자의 메일이나 카카오톡에 바로 붙여넣기(Ctrl+V) 하시면 됩니다.
                        </p>
                    </div>
                </div>

                <!-- 오른쪽 열: 미리보기 -->
                <div class="flex flex-col h-full">
                    <h4 class="font-bold text-gray-800 border-b-2 border-emerald-100 pb-3 flex items-center mb-5 text-lg">
                        <svg class="w-6 h-6 text-emerald-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        미리보기 (실시간 반영)
                    </h4>
                    
                    <div id="emailPreview" contenteditable="true" spellcheck="false" class="w-full flex-grow min-h-[450px] p-5 border border-gray-200 rounded-xl bg-gray-50 text-[14px] text-gray-800 leading-relaxed focus:outline-none shadow-inner overflow-y-auto whitespace-pre-wrap"></div>
                </div>

            </div>
        </div>

        <!-- 푸터 -->
        <div class="px-8 py-5 border-t border-gray-100 bg-white">
            <div class="flex items-center justify-between mb-4">
                <p id="copyStatus" class="text-sm font-bold text-emerald-600 opacity-0 transition-opacity duration-300 flex items-center">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    클립보드에 복사되었습니다!
                </p>
                <button onclick="copyToClipboard()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition transform hover:-translate-y-0.5 flex items-center text-base">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    텍스트 복사하기
                </button>
            </div>
            
            <!-- 투어메이커 규정 로고 및 문구 -->
            <div class="text-center mt-3 pt-4 border-t border-dashed border-gray-200">
                <a href="https://tourmaker.kr" target="_blank" class="inline-block transition transform hover:scale-105">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png" alt="투어메이커 로고" class="h-6 mx-auto mb-1.5">
                </a>
                <p class="text-[12px] text-[#6c757d] text-center">
                    [System Powered by TOURMAKER] 본 스마트 가이드북은 <a href="https://tourmaker.kr" target="_blank" class="font-bold hover:underline">투어메이커</a>의 기획과 트래블 테크 기술 제휴로 제작되었습니다.
                </p>
            </div>
        </div>

    </div>

    <script>
        window.onload = function() {
            updatePreview();
        };

        function updatePreview() {
            const school = document.getElementById('schoolInput').value || '[학교/기관명]';
            const eventName = document.getElementById('eventInput').value || '[행사명]';
            const url = document.getElementById('urlInput').value || 'https://indadady.github.io/Departure_Documents/';
            const guidebookUrl = document.getElementById('guidebookInput').value || '[스마트 가이드북 URL]';
            const previewBox = document.getElementById('emailPreview');

            const hlSchool = `<strong style="color: #4f46e5; background-color: #eef2ff; padding: 2px 4px; border-radius: 4px;">${school}</strong>`;
            const hlEvent = `<strong style="color: #059669; background-color: #ecfdf5; padding: 2px 4px; border-radius: 4px;">${eventName}</strong>`;

            const template = `${hlSchool} 실무 이행 보고 및 행정 서류 대체 시스템 안내

안녕하십니까,
귀기관의 안전하고 성공적인 ${hlEvent} 일정 진행을 위해 당사는 교육청 지침과 현지 실정을 합리적으로 조율한 <strong>[투어메이커 스마트 행정 시스템]</strong>을 운영하고 있습니다. 본 안내는 행정적 완결성을 높이고 실무적 오해를 방지하기 위해 작성되었습니다.

1. 실무 선제 이행 및 자금 집행 현황
당사는 귀 기관의 안정적이고 원활한 행사 준비를 최우선으로 하여, 선금 수령(또는 사후 정산 청구) 전임에도 당사의 자금으로 아래와 같이 필수 항목에 대한 선제적 조치를 이행하고 있습니다.
- <strong>항공권 발권 (해외/제주 등):</strong> 단체 좌석의 확실한 확보와 발권 시한 준수를 위해, 당사 자금으로 선결제 및 발권을 완료하였습니다.
- <strong>현지 인프라 수배 (호텔/차량):</strong> 숙박 및 전세버스의 예약 확정을 위해 요구되는 선입금(Deposit) 및 보증금을 당사가 우선 집행하여 안정적인 인프라를 확보하고 있습니다. 
- <strong>프로그램 및 입장권 (공연/체험 등):</strong> 조기 매진이 우려되거나 사전 결제가 필수적인 현지 일정(뮤지컬 예매, 특수 체험, 주요 관광지 입장권 등)에 대해 당사 자금으로 예매를 완료하여 차질 없는 일정을 준비 중입니다.
- <strong>행정 절차:</strong> 본 행사의 결제 방식(선금 신청 또는 사후 정산)과 무관하게, 행정 처리 기간 중 발생할 수 있는 예약 지연 리스크를 방지하고자 당사가 자금 부담을 안고 실무를 선행하고 있음을 보고드립니다.

2. 카테고리별 증빙 서류 대체 및 관리 원칙
현지(국내/해외) 시스템상 국내 표준 양식과 100% 일치하는 서류 징구가 불가한 항목은 아래와 같이 합리적인 대체 증빙을 통해 행정적 근거를 마련하였습니다.
🏠 숙박: 영업허가증(License) 및 예약확인서로 안전성을 확인합니다.
🚌 차량: 운수국 인가 운송사업허가증 및 보험증권으로 합법성을 증명합니다.
🍱 식사: 예정 또는 확정된 <strong>식단표(메뉴)</strong>를 통해 위생과 영양 상태를 관리합니다.
📂 기타 및 추가 서류: <strong>내국인 인솔자 및 현지 가이드 관련 서류(성범죄경력조회 등)</strong>와 <strong>출발 전 여행자보험 가입 증명서</strong> 등 필수 안전 서류를 철저히 완비하며, [T-safe24] 시스템을 통해 실시간 모니터링을 지원합니다. 즉시 징구할 수 없는 현지 서류들은 상황에 맞는 최적의 보완 증빙으로 갈음하여, 추후 아래 링크의 '출발전제출서류'함에 실시간 업로드하겠습니다. 

3. 투어메이커의 역할 및 관리 범위
당사는 용역 수행사로서 현지 업체와의 원활한 소통과 행정적 보완을 위해 최선을 다합니다. 
다만, 천재지변이나 현지 법령 변경 등 당사의 통제 범위를 벗어난 불가항력적 상황에 대해서는 기관과 긴밀히 협의하여 최선의 대안을 도출하는 '전문적인 중재자' 역할을 수행합니다.

📂 출발전제출서류: <a href="${url}" style="color: #2563eb; text-decoration: underline;" target="_blank">${url}</a>

🛡️ 실시간 안전 시스템 (T-safe24): <a href="https://indadady.github.io/T-safe24/" style="color: #2563eb; text-decoration: underline;" target="_blank">https://indadady.github.io/T-safe24/</a>
(단순한 종이 서류상의 '학생 후송 대책'을 넘어, 당사는 자체 구축한 [T-safe24]를 통해 ① GPS 기반 학생/인솔자 실시간 위치 확인, ② 24시간 현지-국내 비상 대응망 가동, ③ 행사 지역 인근 최적 병원망 연동 등 실제 현장 상황에 최적화된 입체적인 학생 안전 케어 시스템을 제공합니다.)

📱 전용 스마트 가이드북: <a href="${guidebookUrl}" style="color: #2563eb; text-decoration: underline;" target="_blank">${guidebookUrl}</a>
(<strong>※ 일정표는 본 메일에 별도 첨부해 드립니다.</strong> 아울러, 위 스마트 가이드북 링크를 통해서도 언제든 최신 일정표 확인 및 다운로드가 가능합니다.
<strong>[💡 투어메이커 스마트 가이드북만의 차별적 강점]</strong>
일회성 종이 일정표나 단순 PDF 파일만 제공하는 일반 여행사와 달리, 당사의 스마트 가이드북은 <strong>실시간 업데이트가 반영되는 살아있는 디지털 자산</strong>입니다. 현지 상황에 따라 일정이 변동되더라도 즉각 동기화되며, 선생님께서 학생·학부모님께 URL 하나만 공유하시면 <strong>종이 일정표 분실 위험</strong> 없이 행사 종료 시까지 여정 전반과 비상 연락망을 완벽히 통제하실 수 있습니다. 또한 인쇄 및 재배포에 따른 선생님의 행정 부담이 제로(0)에 가깝게 해소되며, 불필요한 인쇄물을 없앤 <strong>'페이퍼리스(Paperless)' 시스템으로 최근 교육청이 강조하는 ESG(친환경) 행정 실천에도 완벽히 부합</strong>합니다.)

당사는 단순한 서류 제출을 넘어 실질적인 책임 관리 시스템으로 귀기관의 여정을 전문적으로 보좌하겠습니다.`;

            previewBox.innerHTML = template;
        }

        function copyToClipboard() {
            const previewBox = document.getElementById('emailPreview');
            const statusText = document.getElementById('copyStatus');
            
            const range = document.createRange();
            range.selectNodeContents(previewBox);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                statusText.style.opacity = '1';
                setTimeout(() => {
                    statusText.style.opacity = '0';
                    selection.removeAllRanges();
                }, 2500);
            } catch (err) {
                alert("복사에 실패했습니다. 텍스트를 직접 드래그하여 복사해주세요.");
            }
        }
    </script>
</body>
</html>
